<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Box Full of Memories</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="sunflower">
🌻
</div>

<p>Preparing your gift...</p>

</div>

<!-- COVER -->

<section id="cover">

<div class="cover-content">

<h3>For</h3>

<h1>Adella Charlene Oetama</h1>

<h2>A Box Full of Memories</h2>

<p>

Some gifts aren't wrapped in paper.<br>

Some are wrapped in memories.

</p>

<button id="openGift">

Open My Gift 🎁

</button>

</div>

</section>

<!-- GIFT -->

<section id="giftScene">

<div class="gift-box" id="giftBox">

📦

</div>

<p class="gift-text">

Tap the Gift Box

</p>

</section>

<!-- MEMORY TABLE -->

<section id="memoryTable">

<h2 class="title">

Choose Your Memory

</h2>

<div class="table">

<div class="item" id="camera">

📷

<span>Gallery</span>

</div>

<div class="item" id="polaroid">

📸

<span>Timeline</span>

</div>

<div class="item" id="flower">

🌻

<span>Things I Love About You</span>

</div>

<div class="item" id="letter">

💌

<span>Letter</span>

</div>

<div class="item" id="cake">

🎂

<span>Birthday Wish</span>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
